# Cuts a release and publishes it to npm — triggered manually from GitHub
# (Actions → Release → Run workflow) or via `gh workflow run release.yml -f bump=<type>`.
#
# It does everything in one run so there is no cross-workflow tag-trigger gotcha:
#   1. Gates:  lint + build + test.
#   2. Version: bumps package.json (or releases the current version with bump=none).
#   3. Notes:   promotes the CHANGELOG "## [Unreleased]" section to a dated heading
#               and uses that (plain-language) section as the GitHub Release body.
#   4. Publish: npm publish with provenance.
#   5. Records: commits the bump + changelog, tags, pushes, creates the GitHub Release.
#
# npm publish runs BEFORE anything is pushed, so if npm auth is not set up the run
# aborts cleanly with the remote untouched — just fix auth and run again.
#
# ─── npm AUTH: OIDC TRUSTED PUBLISHING (no tokens) ─────────────────────────────
# This workflow publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
# Each run mints a short-lived, workflow-scoped credential and npm attaches a
# provenance attestation automatically. Requirements (handled below): the
# `id-token: write` permission and npm CLI >= 11.5.1.
#
# ONE-TIME SETUP (maintainer):
#   1. The package must already exist on npm. Trusted publishers cannot be
#      configured for a name that has never been published, so the FIRST version
#      is published once locally with 2FA (`npm publish`). See AGENTS.md.
#   2. Then on npmjs.com → the package's Settings → Trusted Publisher → add a
#      GitHub Actions publisher:
#          Organization/user: automaze-me
#          Repository:        n8n-nodes-freescout
#          Workflow filename: release.yml
#          Environment:       (leave blank)
#   No repository secret is needed.

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for this release'
        type: choice
        required: true
        default: patch
        options:
          - none
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut release and publish
    runs-on: ubuntu-latest

    permissions:
      contents: write # push the version commit + tag and create the GitHub Release
      id-token: write # mint the OIDC token for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags for the "already released" guard

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # >= 22.14 required by npm trusted publishing
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Lint, build, test
        run: |
          npm run lint
          npm run build
          npm test

      - name: Bump version
        id: bump
        run: |
          if [ "${{ inputs.bump }}" != "none" ]; then
            npm version "${{ inputs.bump }}" --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Guard against re-releasing an existing version
        run: |
          VERSION='${{ steps.bump.outputs.version }}'
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists on the remote. Choose a version bump."
            exit 1
          fi

      - name: Promote changelog and extract release notes
        run: |
          node .github/scripts/release-changelog.mjs \
            '${{ steps.bump.outputs.version }}' \
            '${{ steps.bump.outputs.date }}' \
            release-notes.md

      - name: Commit and tag
        run: |
          VERSION='${{ steps.bump.outputs.version }}'
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): $VERSION"
          git tag "$VERSION"

      - name: Publish to npm (OIDC trusted publishing, with provenance)
        # Runs BEFORE the push so an auth/OIDC failure aborts with nothing pushed.
        # `npm run release` (n8n-node release) lints, builds, and publishes. With
        # npm >= 11.5.1 and a trusted publisher configured, npm authenticates via
        # the OIDC token (id-token: write) and attaches provenance automatically —
        # no NODE_AUTH_TOKEN / NPM_TOKEN required.
        run: npm run release

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION='${{ steps.bump.outputs.version }}'
          gh release create "$VERSION" --title "$VERSION" --notes-file release-notes.md
